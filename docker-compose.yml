services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-inspections_db}
      POSTGRES_USER: ${POSTGRES_USER:-inspections_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-inspections_pass}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inspections_user} -d ${POSTGRES_DB:-inspections_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin123};
        mc mb -p local/${S3_BUCKET:-evidences} || true;
        mc anonymous set download local/${S3_BUCKET:-evidences};
        exit 0;
      "
    restart: "no"

  api:
    build:
      context: ./backend
      target: development
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://inspections_user:inspections_pass@postgres:5432/inspections_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin123}
      S3_BUCKET: ${S3_BUCKET:-evidences}
      EVIDENCE_MAX_FILE_SIZE_BYTES: ${EVIDENCE_MAX_FILE_SIZE_BYTES:-10485760}
      EVIDENCE_ALLOWED_MIME_TYPES: ${EVIDENCE_ALLOWED_MIME_TYPES:-image/jpeg,image/png,image/webp,application/pdf}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES:-60}
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/tests:/app/tests
      - ./backend/alembic:/app/alembic
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      target: development
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://inspections_user:inspections_pass@postgres:5432/inspections_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadmin123}
      S3_BUCKET: ${S3_BUCKET:-evidences}
      EVIDENCE_MAX_FILE_SIZE_BYTES: ${EVIDENCE_MAX_FILE_SIZE_BYTES:-10485760}
      EVIDENCE_ALLOWED_MIME_TYPES: ${EVIDENCE_ALLOWED_MIME_TYPES:-image/jpeg,image/png,image/webp,application/pdf}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod}
      APP_ENV: ${APP_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    command: rq worker --url ${REDIS_URL:-redis://redis:6379/0} default
    restart: unless-stopped

volumes:
  pg_data:
  minio_data:
